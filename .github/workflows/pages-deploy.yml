name: "Build and Deploy"
on:
  push:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: Build site
        run: |
          set -o pipefail
          bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}" 2>&1 | tee jekyll-build.log
        env:
          JEKYLL_ENV: "production"

      # Guardrail 1: fail if Jekyll emitted any "Build Warning: Layout ... does not exist".
      # These warnings indicate a theme/layout misconfiguration (exactly the class of silent
      # failure that caused the 'no theme' bug on 2026-04-19). Jekyll doesn't error on them
      # by default — we make them fatal here.
      - name: Gate on Jekyll build warnings
        run: |
          if grep -qE "Build Warning: Layout .* does not exist" jekyll-build.log; then
            echo "::error::Jekyll emitted layout-missing warnings. Theme is not applying."
            grep "Build Warning" jekyll-build.log
            exit 1
          fi
          echo "✅ No layout warnings."

      # Guardrail 2: structural smoke test on the built _site.
      # Asserts every page has <!doctype>, <head>, <body>; index.html links a
      # stylesheet; file size is reasonable; home page has at least one article.
      - name: Smoke test built site
        run: ./scripts/smoke-test.sh "_site${{ steps.pages.outputs.base_path }}"

      - name: Test site (htmlproofer)
        run: |
          bundle exec htmlproofer _site \
            --disable-external \
            --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"
        continue-on-error: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
