# ────────────────────────────────────────────────────────────
# Minimal Mistakes theme — rock-solid on GitHub Pages,
# polished look, dark skin by default, simple + durable.
# ────────────────────────────────────────────────────────────

remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"   # options: default, air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

# Site
title: "Danny Makhoul"
subtitle: "Systems thinker · Durable AI tools · Vibe coding"
name: "Danny Makhoul"
description: >-
  Writing about vibe coding, durable architecture, tier-list thinking,
  and the honest lessons from shipping real things.

url: "https://dimmmak.github.io"
baseurl: ""

# Language
locale: "en-US"
timezone: America/New_York

# Search
search: true
search_full_content: true

# Author (sidebar profile)
author:
  name: "Danny Makhoul"
  bio: "Systems thinker building durable AI tools. Econ degree. Self-taught via Claude Code."
  location: "USA"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/DimmMak"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/DimmMak"

# Collections
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
      toc: true
      toc_sticky: true

  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Permalinks
permalink: /:categories/:title/

# Build
markdown: kramdown
highlighter: rouge
paginate: 10
paginate_path: /page:num/
excerpt_separator: "<!--more-->"
future: true   # publish future-dated posts immediately (local time vs UTC drift)

# Plugins (GitHub Pages whitelist)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-paginate

# Categories / tags archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Excludes
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata

# Include _pages collection
include:
  - _pages
